name: Playwright Tests with Allure

on:
  workflow_call:
    inputs:
      ENV:
        required: false
        type: string
        default: 'dev'
      ALLURE_REPORT_NAME:
        required: true
        type: string
      ALLURE_REPORT_DEPLOY_FOLDER:
        required: true
        type: string
      SEND_EMAIL:
        required: false
        type: string
        default: 'false'
      EMAIL_TITLE:
        required: false
        type: string
      EMAIL_RECIPIENTS:
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # ✅ required for gh-pages deployment
      pages: write        # ✅ required for Pages
      id-token: write     # ✅ required for OIDC authentication
      issues: write
    timeout-minutes: 300
    outputs:
      report-path: ${{ steps.construct_path.outputs.report-path }}
      run-tests-outcome: ${{steps.capture-test-status.outputs.run-tests-outcome}}

    env:
      TEST_ENV:  ${{ inputs.ENV }}
      FILENAME: playwright

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        id: run-tests
        continue-on-error: true
        run: npx playwright test

      - name: Capture test status
        id: capture-test-status
        if: always()
        run: |
          echo "Run tests outcome: ${{ steps.run-tests.outcome }}"
          if [[ "${{ steps.run-tests.outcome }}" == "success" ]]; then
            echo "run-tests-outcome=PASS" >> $GITHUB_OUTPUT
          else
            echo "run-tests-outcome=FAIL" >> $GITHUB_OUTPUT
          fi

      - name: Set Allure env properties
        if: always()
        continue-on-error: true
        run: |
          mkdir -p ./allure-results
          echo "env=${{ inputs.ENV }}" >> ./allure-results/environment.properties

      - name: Generate Allure Report
        id: allure-report
        if: always()
        run: |
          npx allure generate ./allure-results --clean -o allure-report

          REPORT_PATH="${{ inputs.ENV }}/${{ env.FILENAME }}/${{ github.run_number }}"

          echo "REPORT_PATH=$REPORT_PATH" >> $GITHUB_ENV
          echo "reports-site-path=$REPORT_PATH" >> $GITHUB_OUTPUT

      - name: Prepare folder structure
        if: always() && steps.allure-report.outcome == 'success'
        run: |
          mkdir -p deploy/${REPORT_PATH}
          cp -r allure-report/* deploy/${REPORT_PATH}/

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && steps.allure-report.outcome == 'success'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./deploy
          keep_files: true

      - name: Construct Report Path
        id: construct_path
        if: always() && steps.allure-report.outcome == 'success'
        run: |
          echo "report-path=${{ steps.allure-report.outputs.reports-site-path }}" >> $GITHUB_OUTPUT
          echo "REPORT_PATH=${{ steps.allure-report.outputs.reports-site-path }}" >> $GITHUB_ENV

      - name: Publish Allure report link
        if: ${{ always() && steps.allure-report.outcome == 'success' }}
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ env.REPORT_PATH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reportPath = `${{ inputs.ENV }}/playwright/${{ github.run_number }}`;

            const allureReportLink = `https://${owner}.github.io/${repo}/${reportPath}/`;

            console.log(`Allure Report link: ${allureReportLink}`);

            const issueBody = `### ✅ Allure Report\n\n[View Report](${allureReportLink})`;

            await github.rest.issues.create({
              owner,
              repo,
              title: `[${{ inputs.ALLURE_REPORT_NAME }}] #${{ github.run_number }}`,
              body: issueBody
            });

      - name: Upload Allure report files to artifacts
        if: ${{ always() && steps.allure-report.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-folder
          path: ./allure-report
          retention-days: 1

      - name: Extract failed testcase names and write to artifact
        if: always()
        run: |
          mkdir -p ./gha-meta         
            
          FAILED_TMP=./gha-meta/failed-tests-raw.txt
          FAILED_FILE=./gha-meta/failed-tests.txt
            
          > "$FAILED_TMP"
          > "$FAILED_FILE"
            
          for f in ./allure-results/*-result.json; do
            if [ -s "$f" ] && jq -e . >/dev/null 2>&1 < "$f"; then
              STATUS=$(jq -r '.status // empty' "$f")
              if [ "$STATUS" = "failed" ]; then
                TEST_NAME=$(jq -r '.name' "$f")
                SUITE=$(jq -r '[.labels[]? | select(.name == "suite") | .value][0] // "unknown suite"' "$f")
                echo "$TEST_NAME (suite: $SUITE)" >> "$FAILED_TMP"
              fi
            fi
          done
            
          # Deduplicate + format
          if [ -s "$FAILED_TMP" ]; then
            sort "$FAILED_TMP" | uniq | sed 's/^/- /' > "$FAILED_FILE"
          else
            echo "(No failed tests were identified in Allure result JSON files.)" > "$FAILED_FILE"
          fi

      - name: Upload failed test list for issue step
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-tests-list
          path: ./gha-meta/failed-tests.txt
          retention-days: 3

  create-failure-issue:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ needs.test.outputs.run-tests-outcome == 'FAIL' }}
    steps:
      - name: Install jq if necessary
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
      - name: Download failed tests artifact
        uses: actions/download-artifact@v4
        with:
          name: failed-tests-list
          path: ./gha-meta
      - name: Read failed tests into env
        run: |
          FAILED=$(cat ./gha-meta/failed-tests.txt)
          # Store multiline value for next step using GITHUB_ENV
          echo "FAILED_TESTS<<EOF" >> $GITHUB_ENV
          echo "$FAILED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Create GitHub Issue on Failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_NAME: ${{ github.workflow }}
          FAILED_TESTS: ${{ env.FAILED_TESTS }}
        run: |
          ISSUE_TITLE="[${RUN_NAME}] Scheduled Run Failure #${RUN_NUMBER}"
          ISSUE_BODY="$(cat <<EOF
          Automation test scheduled run '${RUN_NAME}' (run #${RUN_NUMBER}) contains failures.
          See logs and [Allure report] for details.
          ### Failed Testcases:
          ${FAILED_TESTS}
          EOF
          )"
          ASSIGNEE="${{ github.repository_owner }}"
          LABEL="automation bug"
          PAYLOAD=$(jq -n \
            --arg title "$ISSUE_TITLE" \
            --arg body "$ISSUE_BODY" \
            --argjson assignees "[\"$ASSIGNEE\"]" \
            --argjson labels "[\"$LABEL\"]" \
            '{title: $title, body: $body, assignees: $assignees, labels: $labels}')
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO/issues \
            -d "$PAYLOAD")
          echo "Issue created: $(echo $RESPONSE | jq '.html_url')"

  send-email:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && inputs.SEND_EMAIL == 'true' }}
    steps:
      - name: Download folder artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report-folder
          path: ./downloaded-artifacts

      - name: Install jq (if necessary)
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Extract test details from Allure report
        if: always()
        id: extract-test-details
        run: |
          set -e
          
          SUMMARY=$(jq -e '{total: .statistic.total, passed: .statistic.passed, failed: .statistic.failed, skipped: .statistic.skipped, broken: .statistic.broken, unknown: .statistic.unknown, duration: .time.duration | tostring}' ./downloaded-artifacts/widgets/summary.json || echo '{}')
          
          DURATION_MS=$(echo $SUMMARY | jq -r .duration)
          DURATION=$((DURATION_MS / 1000))
          HOURS=$((DURATION / 3600))
          MINUTES=$(( (DURATION % 3600) / 60 ))
          SECONDS=$((DURATION % 60))
          FORMATTED_DURATION=$(printf "%02d:%02d:%02d" $HOURS $MINUTES $SECONDS)
          
          TOTAL_SCENARIOS=$(echo "$SUMMARY" | jq -r .total)
          PASSED=$(echo "$SUMMARY" | jq -r .passed)
          FAILED=$(echo "$SUMMARY" | jq -r .failed)
          SKIPPED=$(echo "$SUMMARY" | jq -r .skipped)
          BROKEN=$(echo "$SUMMARY" | jq -r .broken)
          UNKNOWN=$(echo "$SUMMARY" | jq -r .unknown)
          
          echo "TOTAL_SCENARIOS=$TOTAL_SCENARIOS" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "BROKEN=$BROKEN" >> $GITHUB_ENV
          echo "UNKNOWN=$UNKNOWN" >> $GITHUB_ENV
          echo "DURATION=$FORMATTED_DURATION" >> $GITHUB_ENV
          echo "EXECUTION_DATETIME=$(date)" >> $GITHUB_ENV
          
          if [ "$TOTAL_SCENARIOS" -gt 0 ]; then
            PASS_RATE=$((PASSED * 100 / TOTAL_SCENARIOS))
          else
            PASS_RATE=0
          fi
          
          echo "PASS_RATE=$PASS_RATE" >> $GITHUB_ENV
          
          if [ "$FAILED" -gt 0 ]; then
            FAILED_TESTS=$(jq -e '[.. | select(.name? | type == "string" and contains(".")) | {test: .name, test_cases: [.children[]? | select(.status == "failed") | .name]}] | map(select(.test_cases | length > 0))' ./downloaded-artifacts/data/suites.json || echo '[]')
            jq -e '[.. | select(.name? | type == "string" and contains(".")) | {error_message: .name, "test_case": ([.children[]?.name])}]' ./downloaded-artifacts/data/categories.json > failed_messages.json || echo '[]' > failed_messages.json
            echo "HAS_FAILED_TESTS=true" >> $GITHUB_ENV
            echo "FAILED_TESTS=$(echo "$FAILED_TESTS" | jq -c .)" >> $GITHUB_ENV
          else
            echo "HAS_FAILED_TESTS=false" >> $GITHUB_ENV
            echo "FAILED_TESTS=[]" >> $GITHUB_ENV
            echo "FAILED_MESSAGES=[]" >> $GITHUB_ENV
          fi

      - name: Generate Email Body
        id: generate-email-body
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ inputs.ENV }}/playwright/${{ github.run_number }}/"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          EMAIL_BODY=$(cat <<'EOF'
          <!DOCTYPE html>
          <html>
           <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{{inputs.ALLURE_REPORT_NAME}} Test Summary Report</title>
           </head>
           <body style="font-family: 'Roboto', Arial, sans-serif; color: #333; margin: 0; padding: 20px; background-color: #f7f9fc;">
            <h2 style="color: #2c3e50; font-size: 28px; margin-bottom: 20px; font-weight: 600;">UI+API Regression - Run #${{ github.run_number }}</h2>
            <div style="display: flex; margin-top: 20px;">
              <div style="max-width: 48%; width: fit-content; text-align: left;">
                <img src="https://quickchart.io/chart?c=%7B%22type%22%3A%22doughnut%22%2C%22data%22%3A%7B%22labels%22%3A%5B%22Passed%22%2C%22Failed%22%2C%22Skipped%22%2C%22Broken%22%2C%22Unknown%22%5D%2C%22datasets%22%3A%5B%7B%22data%22%3A%5B${{ env.PASSED }}%2C${{ env.FAILED }}%2C${{ env.SKIPPED }}%2C${{ env.BROKEN }}%2C${{ env.UNKNOWN }}%5D%2C%22backgroundColor%22%3A%5B%22%2397cc64%22%2C%22%23fd5a3e%22%2C%22%23aaa%22%2C%22%23ffd050%22%2C%22%23d35ebe%22%5D%7D%5D%7D%2C%22options%22%3A%7B%22plugins%22%3A%7B%22doughnutlabel%22%3A%7B%22labels%22%3A%5B%7B%22text%22%3A%22${{ env.PASS_RATE }}%25%20Passed%22%2C%22font%22%3A%7B%22size%22%3A20%2C%22weight%22%3A%22bold%22%2C%22color%22%3A%22%23ffffff%22%7D%7D%5D%7D%7D%7D%7D" alt="Test Results Doughnut Chart" width="450">
              </div>
            <div style="max-width: 48%; width: fit-content; background-color: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 8px; text-align: left;">         
              <div style="flex: 1; margin-bottom: 20px;">
                <p style="font-size: 14px; margin: 5px 0;"><strong>Total Scenarios:</strong> ${{ env.TOTAL_SCENARIOS }}</p>
                <p style="font-size: 14px; margin: 5px 0;">✅ <strong>Passed:</strong> ${{ env.PASSED }}</p>
                <p style="font-size: 14px; margin: 5px 0;">❌ <strong>Failed:</strong> ${{ env.FAILED }}</p>
                <p style="font-size: 14px; margin: 5px 0;">⏭️ <strong>Skipped:</strong> ${{ env.SKIPPED }}</p>
                <p style="font-size: 14px; margin: 5px 0;">🎗️ <strong>Broken:</strong> ${{ env.BROKEN }}</p>
                <p style="font-size: 14px; margin: 5px 0;">❓ <strong>Unknown:</strong> ${{ env.UNKNOWN }}</p>
              </div>
              <div style="flex: 1; margin-bottom: 20px;">           
                <p style="font-size: 14px; margin: 5px 0;">🌐 <strong>Environment:</strong> ${{ inputs.ENV }}</p>
                <p style="font-size: 14px; margin: 5px 0;">⏰ <strong>Execution Datetime:</strong> ${{ env.EXECUTION_DATETIME }}</p>
                <p style="font-size: 14px; margin: 5px 0;">📝 <strong>Test Duration:</strong> ${{ env.DURATION }}</p>
              </div>
            </div>
          </div>
          EOF
          )
          
          if [ "${{ env.HAS_FAILED_TESTS }}" = "true" ]; then
            FAILED_TESTS_TABLE="<h3 style='font-size: 20px; color: #2c3e50;'>Failed Tests:</h3><table style='width: 100%; border: 1px solid #ddd; border-collapse: collapse; margin-top: 20px;'>"
            FAILED_TESTS_TABLE="$FAILED_TESTS_TABLE<tr style='background-color: #f2f2f2; text-align: left;'>
              <th style='padding: 8px; border: 1px solid #ddd;'>Test Suite</th>
              <th style='padding: 8px; border: 1px solid #ddd;'>Test Name</th>
              <th style='padding: 8px; border: 1px solid #ddd;'>Error Message</th>
            </tr>"
          
            IFS=$'\n'
            for test in $(echo '${{ env.FAILED_TESTS }}' | jq -c '.[]'); do
              TEST_SUITE=$(echo "$test" | jq -r '.test')
              TEST_CASES=$(echo "$test" | jq -r '.test_cases[]')
          
              FAILED_MESSAGES=$(cat failed_messages.json)
          
              FIRST_ROW=true
              for TEST_CASE in $TEST_CASES; do
                ERROR_MESSAGE=$(echo "$FAILED_MESSAGES" | jq -r --arg TEST_CASE "$TEST_CASE" '.[] | select(.test_case | index($TEST_CASE)) | .error_message')
                if [ "$FIRST_ROW" = "true" ]; then
                  FAILED_TESTS_TABLE="$FAILED_TESTS_TABLE
                  <tr style='background-color: #ffffff;'>
                    <td style='padding: 8px; border: 1px solid #ddd;' rowspan=\"$(echo "$TEST_CASES" | wc -l)\">$TEST_SUITE</td>
                    <td style='padding: 8px; border: 1px solid #ddd;'>$TEST_CASE</td>
                    <td style='padding: 8px; border: 1px solid #ddd;'>$ERROR_MESSAGE</td>
                  </tr>"
                  FIRST_ROW=false
                else
                  FAILED_TESTS_TABLE="$FAILED_TESTS_TABLE
                  <tr style='background-color: #ffffff;'>
                    <td style='padding: 8px; border: 1px solid #ddd;'>$TEST_CASE</td>
                    <td style='padding: 8px; border: 1px solid #ddd;'>$ERROR_MESSAGE</td>
                  </tr>"
                fi
              done
            done
          
            FAILED_TESTS_TABLE="$FAILED_TESTS_TABLE</table>"
            EMAIL_BODY="$EMAIL_BODY$FAILED_TESTS_TABLE"
          fi
          
          EMAIL_BODY="$EMAIL_BODY
            <div style=\"text-align: center; margin-top: 20px;\">
              <a href="$REPORT_URL" style=\"background-color: #3498db; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-size: 16px; margin: 0 10px;\">View Full Report</a>
              <a href="$RUN_URL" style=\"background-color: #2ecc71; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-size: 16px; margin: 0 10px;\">GitHub Action Run</a>
            </div>
            <div style=\"margin-top: 30px; font-size: 12px; color: #888; text-align: center;\">
              <p>&copy; 2025 UI+API Automation</p>
            </div>
            </body>
          </html>"
          
          echo "EMAIL_BODY<<EOF" >> $GITHUB_ENV
          echo "$EMAIL_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

        env:
          PASSED: ${{ env.PASSED }}
          FAILED: ${{ env.FAILED }}
          SKIPPED: ${{ env.SKIPPED }}
          BROKEN: ${{ env.BROKEN }}
          TOTAL_SCENARIOS: ${{ env.TOTAL_SCENARIOS }}
          DURATION: ${{ env.DURATION }}
          ENVIRONMENT: ${{ inputs.ENV }}

      - name: Send notification email
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ inputs.EMAIL_TITLE || inputs.ALLURE_REPORT_NAME }} - Run #${{ github.run_number }}"
          to: ${{ inputs.EMAIL_RECIPIENTS || secrets.REPORT_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            ${{ env.EMAIL_BODY }}

      - name: Fail workflow if tests failed
        if: ${{ needs.test.outputs.run-tests-outcome == 'FAIL' }}
        run: exit 1

  cleanup:
    needs: [test, send-email]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Cleanup workspace
        run: |
          echo "Cleaning up workspace..."
          rm -rf ${{ github.workspace }}
